<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Free Tool Dashboard | VibeHost</title><style>*{box-sizing:border-box}body{margin:0;font-family:Georgia,"Times New Roman",serif;background:#f5f7fb;color:#101828}.wrap{max-width:980px;margin:0 auto;padding:18px}.hero{background:linear-gradient(135deg,#17222f,#253b33 58%,#c89a2b);color:#fff;border-radius:30px;padding:28px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}.stat,.card{background:#fff;border:1px solid #d0d5dd;border-radius:24px;padding:20px;box-shadow:0 20px 60px rgba(15,23,42,.08)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}@media(max-width:760px){.stats,.grid{grid-template-columns:1fr}}</style></head>
<body><div class="wrap"><section class="hero"><h1>{{ user.full_name or user.email }}</h1><p>Free tool account. Limit: 2 invoices and 2 quotations before upgrade.</p></section><div class="stats"><div class="stat"><strong>{{ invoices }}</strong><br>Invoices</div><div class="stat"><strong>{{ quotations }}</strong><br>Quotations</div></div><div class="grid"><a class="card" href="/free-tools/invoices"><strong>Manage invoices</strong><br>Create and review invoice records.</a><a class="card" href="/free-tools/quotations"><strong>Manage quotations</strong><br>Create and review quotation records.</a></div></div></body></html>

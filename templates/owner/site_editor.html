<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Website Editor | VibeHost</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Trebuchet MS",Verdana,sans-serif;background:#f4f6fb;color:#101828}.wrap{max-width:980px;margin:0 auto;padding:18px}.card{background:#fff;border:1px solid #d0d5dd;border-radius:28px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.08)}label{display:block;margin:14px 0 8px;font-weight:700}input,textarea,select{width:100%;padding:14px;border:1px solid #d0d5dd;border-radius:16px}textarea{min-height:110px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.msg{margin-bottom:14px;padding:14px 16px;border-radius:18px}.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}.success{background:#ecfdf3;border:1px solid #bbf7d0;color:#166534}button{margin-top:18px;padding:16px 18px;border:0;border-radius:16px;background:#111827;color:#fff;font-weight:800}@media(max-width:760px){.grid,.grid3{grid-template-columns:1fr}}</style></head>
<body><div class="wrap"><div class="card"><h1>Website Editor</h1><p>Update the real current business and website data used by the live template.</p>{% if error %}<div class="msg error">{{ error }}</div>{% endif %}{% if success %}<div class="msg success">{{ success }}</div>{% endif %}
<form method="POST" enctype="multipart/form-data">
<label>Business name</label><input name="business_name" value="{{ business.business_name }}">
<label>Description</label><textarea name="description">{{ business.description }}</textarea>
<div class="grid"><div><label>Town</label><input name="town" value="{{ business.town }}"></div><div><label>Region</label><select name="region">{% for region in region_options %}<option value="{{ region }}" {% if business.region==region %}selected{% endif %}>{{ region }}</option>{% endfor %}</select></div></div>
<div class="grid"><div><label>Phone</label><input name="phone" value="{{ business.phone }}"></div><div><label>WhatsApp</label><input name="whatsapp" value="{{ business.whatsapp }}"></div></div>
<label>Email</label><input name="email" value="{{ business.email }}">
<label>Hero title</label><input name="hero_title" value="{{ site.hero_title }}">
<label>Hero subtitle</label><textarea name="hero_subtitle">{{ site.hero_subtitle }}</textarea>
<div class="grid3"><div><label>Primary color</label><input type="color" name="primary_color" value="{{ site.primary_color }}"></div><div><label>Secondary color</label><input type="color" name="secondary_color" value="{{ site.secondary_color }}"></div><div><label>Accent color</label><input type="color" name="accent_color" value="{{ site.accent_color }}"></div></div>
<div class="grid"><div><label>Font style</label><select name="font_style"><option value="modern" {% if site.font_style=='modern' %}selected{% endif %}>Modern</option><option value="luxury" {% if site.font_style=='luxury' %}selected{% endif %}>Luxury</option><option value="friendly" {% if site.font_style=='friendly' %}selected{% endif %}>Friendly</option></select></div><div><label>Wallpaper style</label><select name="wallpaper_style"><option value="premium" {% if site.wallpaper_style=='premium' %}selected{% endif %}>Premium</option><option value="editorial" {% if site.wallpaper_style=='editorial' %}selected{% endif %}>Editorial</option><option value="clean" {% if site.wallpaper_style=='clean' %}selected{% endif %}>Clean</option></select></div></div>
<label>Logo upload</label><input type="file" name="logo" accept="image/*">
<button type="submit">Save Website Changes</button>
</form></div></div></body></html>
